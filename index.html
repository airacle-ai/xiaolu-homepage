<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>小鹿</title>
  <style>
    :root {
      --bg: #0d1117;
      --surface: #161b22;
      --border: #30363d;
      --accent: #c8a96e;
      --accent-soft: rgba(200, 169, 110, 0.12);
      --text-primary: #e6edf3;
      --text-muted: #8b949e;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
    }

    body {
      background-color: var(--bg);
      color: var(--text-primary);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC",
        "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      overflow: hidden;
    }

    /* Ambient background blobs */
    .bg-blob {
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.18;
      pointer-events: none;
      animation: float 8s ease-in-out infinite alternate;
    }
    .bg-blob-1 {
      width: 420px; height: 420px;
      background: radial-gradient(circle, #c8a96e, transparent 70%);
      top: -100px; left: -120px;
      animation-delay: 0s;
    }
    .bg-blob-2 {
      width: 300px; height: 300px;
      background: radial-gradient(circle, #6e9dc8, transparent 70%);
      bottom: -80px; right: -80px;
      animation-delay: 3s;
    }

    @keyframes float {
      0%   { transform: translate(0, 0) scale(1); }
      100% { transform: translate(20px, 30px) scale(1.05); }
    }

    /* Card */
    .card {
      position: relative;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 52px 48px 44px;
      text-align: center;
      width: 320px;
      box-shadow:
        0 0 0 1px rgba(255,255,255,0.04) inset,
        0 20px 60px rgba(0,0,0,0.5);
      animation: cardIn 0.7s cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    @keyframes cardIn {
      from { opacity: 0; transform: translateY(28px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Avatar ring */
    .avatar-wrap {
      position: relative;
      width: 100px;
      height: 100px;
      margin: 0 auto 24px;
    }

    .avatar-ring {
      position: absolute;
      inset: -4px;
      border-radius: 50%;
      background: conic-gradient(
        from 0deg,
        var(--accent) 0%,
        transparent 40%,
        transparent 60%,
        var(--accent) 100%
      );
      animation: spin 6s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .avatar-inner {
      position: relative;
      width: 100%;
      height: 100%;
      border-radius: 50%;
      background: var(--bg);
      padding: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      z-index: 1;
    }

    .avatar-placeholder {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      background: linear-gradient(135deg, #c8a96e 0%, #8b6f3e 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 36px;
      user-select: none;
    }

    /* Name */
    .name {
      font-size: 26px;
      font-weight: 700;
      letter-spacing: 0.04em;
      color: var(--text-primary);
      margin-bottom: 6px;
    }

    .name-en {
      font-size: 13px;
      color: var(--text-muted);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-bottom: 24px;
    }

    /* Divider */
    .divider {
      width: 40px;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
      margin: 0 auto 24px;
      border-radius: 2px;
    }

    /* Tag / badge */
    .tag {
      display: inline-block;
      background: var(--accent-soft);
      border: 1px solid rgba(200, 169, 110, 0.3);
      color: var(--accent);
      font-size: 12px;
      padding: 4px 14px;
      border-radius: 100px;
      letter-spacing: 0.06em;
    }

    /* Footer note */
    .footer {
      margin-top: 32px;
      font-size: 11px;
      color: var(--border);
      letter-spacing: 0.04em;
    }

    /* Subtle particles */
    .particles {
      position: fixed;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
    }
    .particle {
      position: absolute;
      width: 2px;
      height: 2px;
      background: var(--accent);
      border-radius: 50%;
      opacity: 0;
      animation: rise linear infinite;
    }
    @keyframes rise {
      0%   { opacity: 0; transform: translateY(0) scale(1); }
      10%  { opacity: 0.6; }
      90%  { opacity: 0.2; }
      100% { opacity: 0; transform: translateY(-100vh) scale(0.4); }
    }
  </style>
</head>
<body>

  <!-- Ambient blobs -->
  <div class="bg-blob bg-blob-1"></div>
  <div class="bg-blob bg-blob-2"></div>

  <!-- Floating particles -->
  <div class="particles" id="particles"></div>

  <!-- Main card -->
  <div class="card">
    <div class="avatar-wrap">
      <div class="avatar-ring"></div>
      <div class="avatar-inner">
        <div class="avatar-placeholder">🦌</div>
      </div>
    </div>

    <div class="name">小鹿</div>
    <div class="name-en">Xiaolu</div>

    <div class="divider"></div>

    <span class="tag">✦ 欢迎来访</span>

    <div class="footer">xiaolu.airacle.tech</div>
  </div>

  <script>
    // Generate floating particles
    const container = document.getElementById('particles');
    for (let i = 0; i < 24; i++) {
      const p = document.createElement('div');
      p.className = 'particle';
      p.style.left = Math.random() * 100 + 'vw';
      p.style.bottom = '-10px';
      p.style.animationDuration = (6 + Math.random() * 10) + 's';
      p.style.animationDelay = (Math.random() * 12) + 's';
      p.style.width = p.style.height = (1 + Math.random() * 2) + 'px';
      container.appendChild(p);
    }
  </script>
</body>
</html>
